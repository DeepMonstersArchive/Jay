<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS位置查看助手</title>
    <link rel="icon" type="image/png" href="https://s2.loli.net/2025/07/04/qPhzjAH8ZN1LSB6.webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('https://s2.loli.net/2025/07/03/jWpSQxOtlBDofb9.jpg') center/cover no-repeat fixed;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
            transition: background 0.5s ease;
        }

        body.night-mode::before {
            background: rgba(10, 15, 30, 0.85);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 25px;
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: white !important;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        .header p {
            font-size: 1.2rem;
            color: white;
            margin-top: 10px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .clock-container {
            text-align: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 90%;
            max-width: 800px;
            margin-bottom: 25px;
        }

        .date-display {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .time-display {
            font-size: 4rem;
            font-weight: 700;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 4px 15px rgba(255, 215, 0, 0.7);
            margin: 15px 0;
            transition: text-shadow 0.5s ease;
        }

        .weekday-display {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .data-container {
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .data-title {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 25px;
            text-shadow: 0 2px 8px rgba(79, 172, 254, 0.4);
            letter-spacing: 1px;
        }

        .boss-blocks-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .boss-block {
            position: relative;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            transform: scale(1);
            z-index: 1;
        }

        .boss-block:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .boss-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            transition: transform 0.4s ease;
        }

        .boss-block:hover .boss-image {
            transform: scale(1.1);
        }

        .boss-info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            text-align: center;
            background: linear-gradient(transparent 60%, rgba(0, 0, 0, 0.7));
        }

        .boss-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            color: white;
        }

        .boss-id {
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 20px;
            color: #FFD700;
            font-weight: 500;
        }

        .data-meta {
            margin-top: 20px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .data-progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .data-progress-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border-radius: 5px;
            transition: width 0.8s ease;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .gallery-container {
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .gallery-title {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 25px;
            text-shadow: 0 2px 8px rgba(79, 172, 254, 0.4);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            aspect-ratio: 1/1;
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 15px 10px 10px;
            transform: translateY(0);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .gallery-item-title {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .gallery-item-desc {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .locations-container {
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .locations-title {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 25px;
            text-shadow: 0 2px 8px rgba(79, 172, 254, 0.4);
        }

        .locations-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .location-tab {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .location-tab:hover {
            background: rgba(79, 140, 201, 0.5);
            transform: translateY(-3px);
        }

        .location-tab.active {
            background: rgba(79, 140, 201, 0.8);
            box-shadow: 0 0 15px rgba(79, 140, 201, 0.5);
        }

        .location-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .location-content.active {
            display: block;
        }

        .location-content h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #FFD700;
        }

        .location-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .location-image {
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            aspect-ratio: 4/3;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .location-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .location-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-desc {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            font-size: 0.85rem;
            text-align: center;
        }

        .donate-container {
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

        .donate-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .donate-title {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.6);
        }

        .qrcode-row {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            max-width: 500px;
            margin: 0 auto 20px;
        }

        .donate-item {
            flex: 1;
            text-align: center;
        }

        .donate-qr {
            margin: 0 auto;
            width: 200px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            transition: all 0.4s ease;
        }

        .donate-qr:hover {
            transform: scale(1.05);
        }

        .donate-qr img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .donate-label {
            margin-top: 12px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .donate-text {
            margin-top: 20px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .donate-highlight {
            color: #FFD700;
            font-weight: 500;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .footer {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            padding: 15px;
        }

        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .fullscreen-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .fullscreen-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
            transition: transform 0.5s ease;
        }

        .fullscreen-overlay.active .fullscreen-image {
            transform: scale(1);
        }

        .close-button {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        .close-button:hover {
            transform: scale(1.2);
            color: #ff6b6b;
            background: rgba(255, 255, 255, 0.1);
        }

        .boss-name-fullscreen {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            color: white;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.9);
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 800px) {

            .boss-blocks-container,
            .gallery-grid,
            .location-images {
                grid-template-columns: repeat(2, 1fr);
            }

            .boss-block {
                height: 180px;
            }

            .locations-tabs {
                gap: 8px;
            }

            .location-tab {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 800px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .time-display {
                font-size: 3rem;
            }

            .date-display {
                font-size: 1.5rem;
            }

            .weekday-display {
                font-size: 1.3rem;
            }

            .data-title,
            .gallery-title,
            .locations-title {
                font-size: 1.6rem;
            }

            .boss-blocks-container,
            .gallery-grid,
            .location-images {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .boss-block {
                height: 220px;
            }

            .close-button {
                top: 20px;
                right: 20px;
                font-size: 2.5rem;
            }

            .boss-name-fullscreen {
                font-size: 2rem;
                bottom: 20px;
            }

            .qrcode-row {
                flex-direction: column;
                gap: 20px;
            }

            .donate-qr {
                width: 180px;
                height: 180px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .time-display {
                font-size: 2.5rem;
            }

            .boss-name-fullscreen {
                font-size: 1.8rem;
            }

            .locations-tabs {
                flex-direction: column;
                align-items: center;
            }

            .donate-title {
                font-size: 1.5rem;
            }

            .donate-qr {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // ============= 修复日夜模式切换问题 =============
            function checkDayNight() {
                const now = new Date();
                const hour = now.getHours();

                // 18:00-次日6:00为夜间模式
                if (hour >= 18 || hour < 6) {
                    document.body.classList.add('night-mode');
                } else {
                    document.body.classList.remove('night-mode');
                }
            }

            function setupDayNightCheck() {
                checkDayNight();
                setInterval(checkDayNight, 5000);
            }

            setupDayNightCheck();

            function updateDateTime() {
                const now = new Date();
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const weekday = weekdays[now.getDay()];

                document.getElementById('dateDisplay').textContent = `${year} 年 ${month} 月 ${day} 日`;
                document.getElementById('timeDisplay').textContent = `${hours} : ${minutes} : ${seconds}`;
                document.getElementById('weekdayDisplay').textContent = `星期 ${weekday}`;
            }

                [2, 3, 2, 1, 1, 2, 1, 1],

                [1, 4, 3, 4, 4, 6, 4, 4],

            const BOSS_NAMES = [

            const BOSS_IMAGES = {

            const fullscreenOverlay = document.getElementById('fullscreenOverlay');
            const fullscreenImage = document.getElementById('fullscreenImage');
            const bossNameFullscreen = document.getElementById('bossNameFullscreen');
            const closeFullscreen = document.getElementById('closeFullscreen');

            function updateDataGroup() {
                const startDate = new Date(2025, 6, 1);
                const now = new Date();

                const adjustedDate = new Date(now.getTime() - 4 * 60 * 60 * 1000);

                const timeDiff = adjustedDate.getTime() - startDate.getTime();
                const dayDiff = Math.floor(timeDiff / (1000 * 3600 * 24));

                const groupIndex = dayDiff % 26;

                const bossData = BOSS_DATA[groupIndex];

                renderBossBlocks(bossData);

                document.getElementById('dataMeta').textContent =
                    `数据组 ${groupIndex + 1}/26 - 每日 04:00 更新`;

                const progressPercent = ((groupIndex + 1) / 26) * 100;
                document.getElementById('dataProgress').style.width = `${progressPercent}%`;

                const nextUpdate = new Date(now);
                if (now.getHours() < 4) {
                    nextUpdate.setHours(4, 0, 0, 0);
                } else {
                    nextUpdate.setDate(nextUpdate.getDate() + 1);
                    nextUpdate.setHours(4, 0, 0, 0);
                }

                const timeToNextUpdate = nextUpdate.getTime() - now.getTime();

                setTimeout(updateDataGroup, timeToNextUpdate);
            }

            function renderBossBlocks(bossData) {
                const container = document.getElementById('bossBlocks');
                container.innerHTML = '';

                bossData.forEach((bossId, index) => {
                    if (index >= BOSS_NAMES.length) return;

                    const bossName = BOSS_NAMES[index];
                    const imgUrl = BOSS_IMAGES[bossName];

                    const bossBlock = document.createElement('div');
                    bossBlock.className = 'boss-block';

                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.alt = bossName;
                    img.className = 'boss-image';

                    img.onerror = function () {
                        this.onerror = null;
                        this.src = 'https://s2.loli.net/2025/07/01/BhVL2pm3wK1AiOS.png';
                        this.style.backgroundColor = '#2c3e50';
                        this.style.display = 'flex';
                        this.style.justifyContent = 'center';
                        this.style.alignItems = 'center';
                        this.innerHTML = '<div style="color:#ecf0f1;font-size:24px">⚠️</div>';
                    };

                    bossBlock.addEventListener('click', function () {
                        openFullscreen(imgUrl, bossName);
                    });

                    const bossInfo = document.createElement('div');
                    bossInfo.className = 'boss-info';

                    const bossNameElement = document.createElement('div');
                    bossNameElement.className = 'boss-name';
                    bossNameElement.textContent = bossName;

                    const bossIdElement = document.createElement('div');
                    bossIdElement.className = 'boss-id';
                    bossIdElement.textContent = `位置: ${bossId}`;

                    bossInfo.appendChild(bossNameElement);
                    bossInfo.appendChild(bossIdElement);

                    bossBlock.appendChild(img);
                    bossBlock.appendChild(bossInfo);
                    container.appendChild(bossBlock);
                });
            }

            function renderGallery() {
                const container = document.getElementById('galleryGrid');
                container.innerHTML = '';

                GALLERY_DATA.forEach(item => {
                    const galleryItem = document.createElement('div');
                    galleryItem.className = 'gallery-item';

                    galleryItem.addEventListener('click', function () {
                        openFullscreen(item.image, item.name);
                    });

                    const img = document.createElement('img');
                    img.className = 'gallery-image';
                    img.src = item.image;
                    img.alt = item.name;

                    img.onerror = function () {
                        this.onerror = null;
                        this.src = 'https://s2.loli.net/2025/07/01/BhVL2pm3wK1AiOS.png';
                    };

                    const overlay = document.createElement('div');
                    overlay.className = 'gallery-overlay';

                    const title = document.createElement('div');
                    title.className = 'gallery-item-title';
                    title.textContent = item.name;

                    const desc = document.createElement('div');
                    desc.className = 'gallery-item-desc';
                    desc.textContent = item.desc;

                    overlay.appendChild(title);
                    overlay.appendChild(desc);

                    galleryItem.appendChild(img);
                    galleryItem.appendChild(overlay);

                    container.appendChild(galleryItem);
                });
            }

            function renderBossLocations() {
                const tabsContainer = document.getElementById('locationsTabs');
                const contentContainer = document.getElementById('locationsContent');

                tabsContainer.innerHTML = '';
                contentContainer.innerHTML = '';

                BOSS_NAMES.forEach((bossName, index) => {
                    const tab = document.createElement('div');
                    tab.className = 'location-tab';
                    if (index === 0) tab.classList.add('active');
                    tab.textContent = bossName;
                    tab.dataset.boss = bossName;

                    tab.addEventListener('click', function () {
                        document.querySelectorAll('.location-tab').forEach(t => t.classList.remove('active'));
                        document.querySelectorAll('.location-content').forEach(c => c.classList.remove('active'));

                        this.classList.add('active');
                        document.querySelector(`.location-content[data-boss="${bossName}"]`).classList.add('active');
                    });

                    tabsContainer.appendChild(tab);

                    const content = document.createElement('div');
                    content.className = 'location-content';
                    content.dataset.boss = bossName;
                    if (index === 0) content.classList.add('active');

                    const title = document.createElement('h3');
                    title.textContent = `${bossName} 详细位置参考`;
                    content.appendChild(title);

                    const imagesContainer = document.createElement('div');
                    imagesContainer.className = 'location-images';

                    if (BOSS_LOCATIONS[bossName]) {
                        BOSS_LOCATIONS[bossName].forEach((location, idx) => {
                            const locationDiv = document.createElement('div');
                            locationDiv.className = 'location-image';

                            const img = document.createElement('img');
                            img.src = location.image;
                            img.alt = `位置${idx + 1}`;

                            img.onerror = function () {
                                this.onerror = null;
                                this.src = 'https://s2.loli.net/2025/07/01/BhVL2pm3wK1AiOS.png';
                            };

                            img.addEventListener('click', function () {
                                openFullscreen(location.image, `${bossName} - ${location.desc}`);
                            });

                            const desc = document.createElement('div');
                            desc.className = 'image-desc';
                            desc.textContent = location.desc;

                            locationDiv.appendChild(img);
                            locationDiv.appendChild(desc);
                            imagesContainer.appendChild(locationDiv);
                        });
                    }

                    content.appendChild(imagesContainer);
                    contentContainer.appendChild(content);
                });
            }

            function openFullscreen(imageUrl, bossName) {
                fullscreenImage.src = imageUrl;
                bossNameFullscreen.textContent = bossName;
                fullscreenOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                document.addEventListener('keydown', handleEscKey);
            }

            function closeFullscreenHandler() {
                fullscreenOverlay.classList.remove('active');
                document.body.style.overflow = '';
                document.removeEventListener('keydown', handleEscKey);
            }

            function handleEscKey(event) {
                if (event.key === 'Escape') {
                    closeFullscreenHandler();
                }
            }

            closeFullscreen.addEventListener('click', closeFullscreenHandler);
            fullscreenOverlay.addEventListener('click', closeFullscreenHandler);
            fullscreenImage.addEventListener('click', function (event) {
                event.stopPropagation();
            });

            updateDateTime();
            updateDataGroup();
            renderGallery();
            renderBossLocations();

            setInterval(updateDateTime, 1000);

            const timeDisplay = document.getElementById('timeDisplay');
            setInterval(() => {
                const hue = Math.floor(Math.random() * 60);
                timeDisplay.style.textShadow = `0 0 15px hsla(${hue}, 100%, 70%, 0.8)`;
            }, 1000);
        });
